plugins:
  - rubocop-rspec
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'pkg/**/*'
    - '.bundle/**/*'

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Layout/LineLength:
  Max: 120

Metrics/ClassLength:
  Max: 200

Metrics/MethodLength:
  Max: 30

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# Request-body / model constructors mirror the API surface — keyword args map
# 1:1 to documented fields, so a long keyword list is intentional, not a smell.
Metrics/ParameterLists:
  CountKeywordArgs: false

# `to_h` / `from_hash` are flat field-mapping methods: each branch handles one
# documented field. Splitting them would hurt readability, not help it.
Metrics/AbcSize:
  Max: 30
  Exclude:
    - 'lib/rerout/create_link_input.rb'

Metrics/CyclomaticComplexity:
  Max: 12
  Exclude:
    - 'lib/rerout/models.rb'

Metrics/PerceivedComplexity:
  Max: 12
  Exclude:
    - 'lib/rerout/models.rb'

# Development dependencies are declared in the gemspec so a single
# `bundle install` resolves everything for contributors.
Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

Naming/AccessorMethodName:
  Enabled: false

RSpec/ExampleLength:
  Max: 25

RSpec/MultipleExpectations:
  Max: 8

RSpec/NestedGroups:
  Max: 5

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

Gemspec/RequiredRubyVersion:
  Enabled: true
